version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: spell-evals-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evals
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: ./frontend
    container_name: spell-evals-app
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/evals
      ASSUMPTION_PENALTY: 0.75
    ports:
      - "3000:3000"

volumes:
  pgdata:
